name: Bug report
description: Something is not working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Smallest code snippet that demonstrates the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: batchit version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12"
    validations:
      required: true
